<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Shortage Tracker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f9ff;
        }
        .medical-primary { background-color: #0d9488; }
        .medical-text-primary { color: #0d9488; }
        .medical-bg-light { background-color: #f0f9ff; }
        .suggestion-item:hover { background-color: #f0f9ff; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .toast {
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform: translateY(100px);
            opacity: 0;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 medical-primary rounded-2xl mb-4 shadow-lg shadow-teal-900/20">
                <i data-lucide="pill" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Medicine Shortage Tracker</h1>
            <p class="text-slate-500 mt-2">Log customer requests for out-of-stock items</p>
        </header>

        <!-- Main Form Card -->
        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-6 md:p-8 mb-8">
            <form id="shortageForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Customer Name -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 flex items-center gap-2">
                            <i data-lucide="user" class="medical-text-primary w-4 h-4"></i>
                            Customer Name
                        </label>
                        <input required type="text" id="customerName" placeholder="e.g. John Doe"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all">
                    </div>

                    <!-- Phone Number -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 flex items-center gap-2">
                            <i data-lucide="phone" class="medical-text-primary w-4 h-4"></i>
                            Phone Number
                        </label>
                        <input required type="tel" id="phoneNumber" placeholder="e.g. +1 234 567 890"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all">
                    </div>
                </div>

                <!-- Medicine Name with Auto-suggest -->
                <div class="space-y-2 relative">
                    <label class="text-sm font-semibold text-slate-700 flex items-center gap-2">
                        <i data-lucide="search" class="medical-text-primary w-4 h-4"></i>
                        Medicine Name
                    </label>
                    <input required type="text" id="medicineName" placeholder="Start typing medicine name..." autocomplete="off"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all">
                    
                    <div id="suggestions" class="hidden absolute z-10 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto">
                        <!-- Suggestions will be injected here -->
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <!-- Quantity -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 flex items-center gap-2">
                            <i data-lucide="hash" class="medical-text-primary w-4 h-4"></i>
                            Quantity
                        </label>
                        <input required type="number" id="quantity" min="1" value="1"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all">
                    </div>

                    <!-- Urgency -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 flex items-center gap-2">
                            <i data-lucide="alert-circle" class="medical-text-primary w-4 h-4"></i>
                            Urgency Level
                        </label>
                        <select id="urgency" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all appearance-none bg-white">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn"
                    class="w-full medical-primary hover:opacity-90 text-white font-bold py-4 rounded-2xl shadow-lg shadow-teal-900/20 transition-all flex items-center justify-center gap-2 disabled:opacity-70">
                    <span id="btnText" class="flex items-center gap-2">
                        <i data-lucide="send" class="w-5 h-5"></i>
                        Log Shortage Request
                    </span>
                    <span id="btnLoader" class="hidden items-center gap-2">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Saving to Database...
                    </span>
                </button>
            </form>
        </div>

        <!-- Live Preview Table -->
        <section class="space-y-4">
            <div class="flex items-center justify-between px-2">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="clock" class="text-sky-500 w-5 h-5"></i>
                    Recent Entries
                </h2>
                <span class="text-xs font-bold uppercase tracking-wider text-slate-400 bg-slate-100 px-2 py-1 rounded">
                    Last 3 Entries
                </span>
            </div>

            <div id="entriesList" class="space-y-3">
                <div class="text-center py-12 bg-white/50 rounded-3xl border-2 border-dashed border-slate-200 text-slate-400">
                    No entries logged yet.
                </div>
            </div>
        </section>

        <!-- Success Toast -->
        <div id="successToast" class="toast fixed bottom-8 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 z-50">
            <i data-lucide="check-circle-2" class="w-5 h-5"></i>
            <span class="font-medium">Request logged successfully!</span>
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center text-slate-400 text-sm">
            <p>© 2026 Pharmacy Management System</p>
            <p class="mt-1">Connected to Google Sheets via Apps Script</p>
        </footer>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const MEDICINE_SUGGESTIONS = [
            "Amoxicillin 500mg", "Atorvastatin 20mg", "Metformin 500mg", "Lisinopril 10mg",
            "Levothyroxine 50mcg", "Amlodipine 5mg", "Gabapentin 300mg", "Omeprazole 20mg",
            "Losartan 50mg", "Sertraline 50mg", "Montelukast 10mg", "Hydrochlorothiazide 25mg",
            "Pantoprazole 40mg", "Furosemide 40mg", "Fluticasone Nasal Spray"
        ];

        let entries = [];
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxcjyEd2-rZTQBD4fvVa4aCQIaxsNQY3Z3HlKMbBRX2r4craQPVjlcrJIeP58pWbXIV/exec';

        const form = document.getElementById('shortageForm');
        const medicineInput = document.getElementById('medicineName');
        const suggestionsDiv = document.getElementById('suggestions');
        const entriesList = document.getElementById('entriesList');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const toast = document.getElementById('successToast');

        // Auto-suggest Logic
        medicineInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if (val.length < 2) {
                suggestionsDiv.classList.add('hidden');
                return;
            }

            const filtered = MEDICINE_SUGGESTIONS.filter(m => m.toLowerCase().includes(val));
            if (filtered.length > 0) {
                suggestionsDiv.innerHTML = filtered.map(m => `
                    <div class="suggestion-item px-4 py-3 cursor-pointer flex items-center gap-2 text-slate-700 border-b border-slate-50 last:border-0" onclick="selectSuggestion('${m}')">
                        <i data-lucide="pill" class="w-4 h-4 text-teal-400"></i>
                        ${m}
                    </div>
                `).join('');
                suggestionsDiv.classList.remove('hidden');
                lucide.createIcons();
            } else {
                suggestionsDiv.classList.add('hidden');
            }
        });

        function selectSuggestion(name) {
            medicineInput.value = name;
            suggestionsDiv.classList.add('hidden');
        }

        // Close suggestions on outside click
        document.addEventListener('click', (e) => {
            if (!medicineInput.contains(e.target) && !suggestionsDiv.contains(e.target)) {
                suggestionsDiv.classList.add('hidden');
            }
        });

        // Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                customerName: document.getElementById('customerName').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                medicineName: document.getElementById('medicineName').value,
                quantity: document.getElementById('quantity').value,
                urgency: document.getElementById('urgency').value,
                timestamp: new Date()
            };

            // UI State: Loading
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            btnLoader.classList.add('flex');

            try {
                // Use URLSearchParams for better compatibility with GAS 'no-cors' mode
                const params = new URLSearchParams();
                params.append('customerName', data.customerName);
                params.append('phoneNumber', data.phoneNumber);
                params.append('medicineName', data.medicineName);
                params.append('quantity', data.quantity);
                params.append('urgency', data.urgency);

                await fetch(GAS_URL, {
                    method: 'POST',
                    body: params,
                    mode: 'no-cors'
                });
                
                // Update Local State
                entries.unshift(data);
                entries = entries.slice(0, 3);
                updateEntriesUI();

                // Success Feedback
                showToast();
                form.reset();
                document.getElementById('urgency').value = 'Medium';

            } catch (error) {
                console.error('Error:', error);
                alert('Failed to save data. Check console for details.');
            } finally {
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                btnLoader.classList.remove('flex');
            }
        });

        function updateEntriesUI() {
            if (entries.length === 0) return;

            entriesList.innerHTML = entries.map(entry => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between group hover:shadow-md transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl flex items-center justify-center ${
                            entry.urgency === 'High' ? 'bg-rose-100 text-rose-500' :
                            entry.urgency === 'Medium' ? 'bg-amber-100 text-amber-500' :
                            'bg-emerald-100 text-emerald-500'
                        }">
                            <i data-lucide="pill" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-slate-800">${entry.medicineName}</h3>
                            <p class="text-sm text-slate-500">${entry.customerName} • ${entry.quantity} units</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] font-bold uppercase px-2 py-1 rounded-full ${
                            entry.urgency === 'High' ? 'bg-rose-50 text-rose-600' :
                            entry.urgency === 'Medium' ? 'bg-amber-50 text-amber-600' :
                            'bg-emerald-50 text-emerald-600'
                        }">
                            ${entry.urgency}
                        </span>
                        <p class="text-[10px] text-slate-400 mt-1">
                            ${new Date(entry.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                        </p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
